name: Feature request
description: Suggest an idea
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: What do you want to see?
      description: Describe the feature and why it's useful.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives
      description: Any workarounds or other approaches you considered.
    validations:
      required: false
